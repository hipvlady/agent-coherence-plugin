title: "[Strict Mode] "
labels: ["strict-mode"]
body:
  - type: markdown
    attributes:
      value: |
        Welcome — this is the **Strict Mode** category. For sharing your `strict_mode.yaml` configs, asking about the deny behavior, reporting unexpected denies, or talking through whether strict mode is the right fit for a workspace.

        Bugs (the wire shape is wrong, the deny didn't fire when it should have) still go to the [bug report template](https://github.com/hipvlady/agent-coherence-plugin/issues/new?template=bug_report.md) — this category is for design discussion + first-impressions feedback.

  - type: textarea
    id: scenario
    attributes:
      label: What you're trying to do (or what happened)
      description: The workspace setup, what you opted into strict mode, what the agent did.
      placeholder: "I opted CLAUDE.md and docs/plans/feature-x.md into strict mode. When session B edited feature-x.md and session A tried to read it again, ..."
    validations:
      required: true

  - type: textarea
    id: strict_mode_yaml
    attributes:
      label: Your strict_mode.yaml (optional)
      description: Helps with concrete advice.
      render: yaml
    validations:
      required: false

  - type: textarea
    id: behavior
    attributes:
      label: Agent behavior observed
      description: Did the agent honor the deny? Loop? Route around via Bash? Surface the issue to you? Roughly how many retry attempts before it stopped?
      placeholder: "Agent got the deny on first Read, retried 3 times with the same Read call, then asked me whether to proceed."
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Plugin version
      description: From `.claude-plugin/plugin.json`. Strict mode requires v0.2.0+.
      placeholder: "v0.2.0"
    validations:
      required: true
