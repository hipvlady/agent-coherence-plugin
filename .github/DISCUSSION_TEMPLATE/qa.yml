title: "[Q&A] "
labels: ["q-a"]
body:
  - type: markdown
    attributes:
      value: |
        Welcome — this is the **Q&A** category. Use it for usage questions, design discussion, or anything that isn't a tracked bug or feature request.

        Before posting:
        - Search [existing Discussions](https://github.com/hipvlady/agent-coherence-plugin/discussions) for the same question
        - Skim the [README](https://github.com/hipvlady/agent-coherence-plugin/blob/main/README.md) and the [FAQ section](https://github.com/hipvlady/agent-coherence-plugin/blob/main/README.md#faq)
        - If it's a bug (the plugin did something wrong), use the [bug report template](https://github.com/hipvlady/agent-coherence-plugin/issues/new?template=bug_report.md) instead

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What you're trying to figure out, in 1-3 sentences.
      placeholder: "Does the plugin work with X? Is there a way to do Y?"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What you've tried, what you've read, what you're trying to accomplish. Helps people answer with the right level of detail.
      placeholder: "I've installed the plugin and run --self-test (green). I'm trying to ..."
    validations:
      required: false

  - type: input
    id: env
    attributes:
      label: Environment (optional)
      description: Plugin version + OS, if the question is install-specific.
      placeholder: "v0.2.0 / macOS 14"
    validations:
      required: false
